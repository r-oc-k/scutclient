name: Build scutclient for AX3000T

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig

      - name: Download SDK
        run: |
          # 使用 23.05 的 SDK，这个版本对 AX3000T (MT7981) 的支持最完善
          SDK_URL="https://downloads.openwrt.org/releases/23.05.0/targets/mediatek/filogic/openwrt-sdk-23.05.0-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          
          # 使用 -f 确保如果 404 就直接报错，不下载废包
          # 使用 --retry 应对网络抖动
          curl -fL --retry 3 "$SDK_URL" -o sdk.tar.xz
          
          # 先检查文件类型再解压
          file sdk.tar.xz
          tar -xJ -f sdk.tar.xz --strip-components=1

      - name: Add scutclient Source
        run: |
          mkdir -p package/scutclient
          # 直接拉取源码，并修正 Makefile 路径
          git clone --depth 1 https://github.com/scutclient/scutclient.git temp-repo
          cp -r temp-repo/openwrt/* package/scutclient/
          
          # 同时拉取界面插件
          git clone --depth 1 https://github.com/scutclient/luci-app-scutclient.git package/luci-app-scutclient

      - name: Configure and Compile
        run: |
          # 1. 解决循环依赖问题：删掉那个引起冲突的包
          ./scripts/feeds update -a
          rm -rf feeds/packages/lang/python/pymysql
          ./scripts/feeds install -a

          # 2. 【核心修复】创建软链接，把编译规则骗到它想要的位置
          # 如果 ../../luci.mk 找不到，我们就手动定位它
          mkdir -p feeds/luci
          [ -f include/luci.mk ] && ln -sf ../../include/luci.mk package/luci-app-scutclient/luci.mk
          # 或者直接指定 SDK 自带的路径
          sed -i 's|../../luci.mk|$(TOPDIR)/feeds/luci/luci.mk|g' package/luci-app-scutclient/Makefile || true

          # 3. 配置包
          echo "CONFIG_PACKAGE_scutclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-scutclient=m" >> .config
          
          make defconfig
          
          # 4. 编译 (先编内核，再编界面)
          make package/scutclient/compile V=s -j$(nproc)
          make package/luci-app-scutclient/compile V=s -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AX3000T-scutclient
          path: bin/packages/**/scutclient*.ipk
