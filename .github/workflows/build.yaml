name: Build SCUTClient Plus for AX3000T

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig

      - name: Download SDK
        run: |
          # 使用 23.05 SDK，它是目前最稳定的适配版本
          SDK_URL="https://downloads.openwrt.org/releases/23.05.0/targets/mediatek/filogic/openwrt-sdk-23.05.0-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          curl -fL "$SDK_URL" -o sdk.tar.xz
          tar -xJ -f sdk.tar.xz --strip-components=1

      - name: Add scutclient & Plus UI Source
        run: |
          # 1. 下载核心程序
          mkdir -p package/scutclient
          git clone --depth 1 https://github.com/scutclient/scutclient.git temp-core
          cp -r temp-core/openwrt/* package/scutclient/

          # 2. 下载你找到的 Plus 版界面程序
          git clone --depth 1 https://github.com/AidenLee1994/luci-app-scutclient-plus.git package/luci-app-scutclient-plus

      - name: Configure and Compile
        run: |
          # 1. 更新并安装所有 feeds 依赖（这是编译界面的前提）
          ./scripts/feeds update -a
          ./scripts/feeds install -a luci
          ./scripts/feeds install -a
          
          # 2. 【核心修复】强行将 SDK 的编译规则链接到正确位置
          # 很多 SDK 默认不带这些，我们得手动去 feeds 目录里翻出来
          mkdir -p include
          [ -f feeds/luci/luci.mk ] && cp feeds/luci/luci.mk include/
          
          # 3. 强制写入配置
          echo "CONFIG_PACKAGE_scutclient=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-scutclient-plus=m" >> .config
          
          # 同步配置并生成 .config 文件
          make defconfig
          
          # 4. 编译
          # 先单独编译核心程序
          make package/scutclient/compile V=s -j$(nproc)
          
          # 再编译界面（如果不成功，这行会报错，但我们可以看到具体缺什么）
          make package/luci-app-scutclient-plus/compile V=s -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AX3000T-SCUTClient-Plus
          # 递归搜索所有生成的 ipk 文件
          path: bin/**/*.ipk
